name: Registry smoke

on:
  # Registry smoke validates an actually published npm artifact, so it is kept
  # out of normal PR CI. Trigger it manually on demand or automatically from a
  # published GitHub Release when a real version should exist in the registry.
  workflow_dispatch:
    inputs:
      package_spec:
        description: 'Registry package spec to validate (for example: jsx-ai@latest or jsx-ai@0.1.5)'
        required: true
        default: 'jsx-ai@latest'
  release:
    types:
      - published

jobs:
  registry-smoke:
    name: Registry install smoke test
    runs-on: ubuntu-latest
    env:
      REGISTRY_SMOKE_SPEC: ${{ github.event_name == 'workflow_dispatch' && inputs.package_spec || '' }}
      REGISTRY_SMOKE_RETRY_ATTEMPTS: '6'
      REGISTRY_SMOKE_RETRY_DELAY_MS: '10000'
    steps:
      - name: Capture start time
        run: echo "JOB_STARTED_AT=$(date +%s)" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Print registry smoke target
        run: |
          echo "Registry smoke target: ${REGISTRY_SMOKE_SPEC:-pending-release-tag-resolution}"
          echo "Registry smoke retry policy: ${REGISTRY_SMOKE_RETRY_ATTEMPTS} attempts, ${REGISTRY_SMOKE_RETRY_DELAY_MS}ms delay"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Set package spec from release tag
        if: github.event_name == 'release'
        # Release tags use the repo convention vX.Y.Z, which maps directly to
        # the published npm target jsx-ai@X.Y.Z for registry verification.
        run: |
          echo "REGISTRY_SMOKE_SPEC=jsx-ai@${GITHUB_EVENT_RELEASE_TAG_NAME#v}" >> "$GITHUB_ENV"
          echo "Resolved release smoke target: jsx-ai@${GITHUB_EVENT_RELEASE_TAG_NAME#v}"
        env:
          GITHUB_EVENT_RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}

      - name: Run registry smoke test
        run: bun run test:smoke:registry

      - name: Write registry smoke summary
        if: always()
        run: |
          ENDED_AT=$(date +%s)
          DURATION_SECONDS=$((ENDED_AT - JOB_STARTED_AT))
          {
            echo "## Registry smoke test"
            echo
            echo "- Job: Registry install smoke test"
            echo "- Event: ${GITHUB_EVENT_NAME}"
            echo "- Ref: ${GITHUB_REF}"
            echo "- Commit: ${GITHUB_SHA}"
            echo "- Package spec: ${REGISTRY_SMOKE_SPEC:-unresolved}"
            echo "- Retry policy: ${REGISTRY_SMOKE_RETRY_ATTEMPTS} attempts, ${REGISTRY_SMOKE_RETRY_DELAY_MS}ms delay"
            echo "- Command: \\`bun run test:smoke:registry\\`"
            echo "- Duration: ${DURATION_SECONDS}s"
            echo "- Result: ${{ job.status }}"
            echo "- Run logs: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "- Workflow run attempt: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/attempts/${GITHUB_RUN_ATTEMPT}"
            echo "- Actions overview: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Registry smoke failure hint
        if: failure()
        run: |
          echo "Registry smoke failed for ${REGISTRY_SMOKE_SPEC:-unknown target}."
          echo "If this was triggered by a fresh release, npm propagation may still be in flight — retry this workflow after the package version becomes visible in the registry."

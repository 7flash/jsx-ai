name: Test

on:
  push:
    branches:
      - main
      - master
      - 'release/**'
      - 'emdash/**'
    tags:
      - 'v*'
  pull_request:

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Capture start time
        run: echo "JOB_STARTED_AT=$(date +%s)" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests
        run: bun run test:unit

      - name: Write unit test summary
        if: always()
        run: |
          ENDED_AT=$(date +%s)
          DURATION_SECONDS=$((ENDED_AT - JOB_STARTED_AT))
          {
            echo "## Unit tests"
            echo
            echo "- Job: Unit tests"
            echo "- Ref: ${GITHUB_REF}"
            echo "- Commit: ${GITHUB_SHA}"
            echo "- Command: \\`bun run test:unit\\`"
            echo "- Duration: ${DURATION_SECONDS}s"
            echo "- Result: ${{ job.status }}"
            echo "- Run logs: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "- Workflow run attempt: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/attempts/${GITHUB_RUN_ATTEMPT}"
            echo "- Actions overview: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions"
          } >> "$GITHUB_STEP_SUMMARY"

  consumer-smoke:
    name: Consumer smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Capture start time
        run: echo "JOB_STARTED_AT=$(date +%s)" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run consumer smoke test
        run: bun run test:smoke

      - name: Write consumer smoke summary
        if: always()
        run: |
          ENDED_AT=$(date +%s)
          DURATION_SECONDS=$((ENDED_AT - JOB_STARTED_AT))
          {
            echo "## Consumer smoke test"
            echo
            echo "- Job: Consumer smoke test"
            echo "- Ref: ${GITHUB_REF}"
            echo "- Commit: ${GITHUB_SHA}"
            echo "- Command: \\`bun run test:smoke\\`"
            echo "- Coverage: file install + packed tarball install"
            echo "- Duration: ${DURATION_SECONDS}s"
            echo "- Result: ${{ job.status }}"
            echo "- Run logs: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "- Workflow run attempt: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/attempts/${GITHUB_RUN_ATTEMPT}"
            echo "- Actions overview: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions"
          } >> "$GITHUB_STEP_SUMMARY"
